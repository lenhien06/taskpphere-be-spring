spring:
  application:
    name: tasksphere
  profiles:
    active: prod

server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
    mime-types:
      - text/html
      - text/xml
      - text/plain
      - text/css
      - text/javascript
      - application/javascript
      - application/json
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    try-it-out-enabled: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# ─── MinIO / Object Storage ───────────────────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:tasksphere-files}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  presigned-url-expiry: 3600    # 1 hour
  preview-url-expiry: 900       # 15 minutes

# ─── Attachment ───────────────────────────────────────────────────────────────
app:
  membership:
    max-members-per-project: 50
    subscription-plan: FREE
  attachment:
    max-file-size: 26214400       # 25MB in bytes
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/gif
      - image/webp
      - image/svg+xml
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/zip
      - application/x-zip-compressed
      - text/plain
      - text/csv

# ─── ClamAV ───────────────────────────────────────────────────────────────────
clamav:
  enabled: ${CLAMAV_ENABLED:false}
  host: ${CLAMAV_HOST:localhost}
  port: ${CLAMAV_PORT:3310}
  timeout: 30000
