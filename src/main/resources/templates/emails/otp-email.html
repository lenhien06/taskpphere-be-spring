<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực tài khoản TaskSphere</title>
</head>
<body style="margin:0; padding:0; background-color:#f3f4f6; font-family:'Segoe UI', Arial, Helvetica, sans-serif; color:#111827;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f3f4f6; margin:0; padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px; background-color:#ffffff; border:1px solid #e5e7eb; border-radius:18px; overflow:hidden;">
                <tr>
                    <td align="center" style="padding:32px 40px 24px;">
                        <img th:src="${logoUrl}" alt="TaskSphere" width="44" height="44" style="display:block; width:44px; height:44px; margin:0 auto 14px;" />
                        <div style="font-size:30px; font-weight:700; color:#111827; letter-spacing:0.4px;" th:text="${appName}">TaskSphere</div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 40px;">
                        <div style="height:1px; background-color:#e5e7eb;"></div>
                    </td>
                </tr>
                <tr>
                    <td style="padding:36px 40px 40px;">
                        <div style="text-align:center; margin-bottom:28px;">
                            <div style="display:inline-block; padding:8px 14px; border-radius:999px; background-color:#eff6ff; color:#1d4ed8; font-size:12px; font-weight:600;">
                                Xác thực tài khoản
                            </div>
                        </div>
                        <h1 style="margin:0 0 16px; text-align:center; font-size:32px; line-height:1.3; color:#111827; font-weight:700;">
                            Bạn sắp hoàn thành rồi
                        </h1>
                        <p style="margin:0 0 12px; font-size:16px; line-height:1.7; color:#374151;">
                            Xin chào,
                        </p>
                        <p style="margin:0 0 24px; font-size:16px; line-height:1.7; color:#374151;">
                            Hãy sử dụng mã xác minh dưới đây để hoàn tất việc đăng ký tài khoản trên <strong th:text="${appName}">TaskSphere</strong>.
                        </p>
                        <div style="margin:28px 0; text-align:center;">
                            <div style="display:inline-block; min-width:220px; padding:18px 28px; border:1px solid #d1d5db; border-radius:16px; background-color:#f9fafb;">
                                <span style="display:block; font-size:36px; line-height:1; letter-spacing:8px; font-weight:800; color:#111827; font-family:Consolas, 'Courier New', monospace;"
                                      th:text="${otp}">123456</span>
                            </div>
                        </div>
                        <p style="margin:0 0 12px; font-size:15px; line-height:1.7; color:#374151;">
                            Mã này sẽ hết hạn sau <strong>5 phút</strong>.
                        </p>
                        <p style="margin:0; font-size:15px; line-height:1.7; color:#374151;">
                            Nếu bạn không thực hiện yêu cầu này, bạn có thể bỏ qua email này.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:0 40px 24px;">
                        <div style="height:1px; background-color:#e5e7eb;"></div>
                    </td>
                </tr>
                <tr>
                    <td align="center" style="padding:0 40px 32px; font-size:13px; line-height:1.7; color:#6b7280;">
                        Email được gửi tự động từ <span th:text="${appName}">TaskSphere</span>.
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
